<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>UM6P Green Map</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="map-container">
        <div id="map"></div>
        <div class="campus-controls" id="campusControls"></div>
    </div>
    
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>Green Map</h2>
            <button class="toggle-sidebar" id="toggleSidebar">◀</button>
        </div>
        
        <div class="stats-banner">
            <span>Projets: <span id="projetCount">0</span></span>
            <span>Campus: <span id="campusName">Tous</span></span>
        </div>
        
        <div class="filters-section">
            <div class="filters-title">Thematic</div>
            <div class="types-filters" id="typesFilters"></div>
        </div>
        
        <div class="sous-types-section">
            <div class="filters-title">PROJET</div>
            <div class="sous-types-list" id="sousTypesList"></div>
        </div>
        
        <div class="trajets-section" id="trajetsSection"></div>
        
        <div class="reset-card">
            <button class="reset-btn" id="resetFilters">Réinitialiser les filtres</button>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="data.js"></script>
<script src="script.js"></script>
</body>
</html>
