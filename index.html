<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>UM6P Green Map</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
    
    <!-- Style personnalisé -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="map-container">
        <div id="map"></div>
        <div class="campus-controls" id="campusControls"></div>
    </div>
    
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>Green Map</h2>
            <button class="toggle-sidebar" id="toggleSidebar">◀</button>
        </div>
        <div class="stats-banner" id="statsBanner">
            <span><span id="projetCount">0</span> projets</span>
            <span><span id="campusName">Tous les campus</span></span>
        </div>
        <div class="types-list" id="typesList"></div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="data.js"></script>
<script src="script.js"></script>
</body>
</html>
